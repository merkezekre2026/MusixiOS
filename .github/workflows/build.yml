name: Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ hashFiles('**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-derived-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Device
        run: |
          xcodebuild -project MusixiOS.xcodeproj \
            -scheme MusixiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            build

      - name: Create IPA
        run: |
          IPA_PATH="$GITHUB_WORKSPACE/MusixiOS.ipa"
          
          BUILT_APP=$(find "$HOME/Library/Developer/Xcode/DerivedData" -path "*/Build/Products/Release-iphoneos/MusixiOS.app" -type d | head -1)
          
          if [ -d "$BUILT_APP" ]; then
            mkdir -p "$GITHUB_WORKSPACE/Payload"
            cp -R "$BUILT_APP" "$GITHUB_WORKSPACE/Payload/"
            cd "$GITHUB_WORKSPACE"
            zip -r MusixiOS.ipa Payload
            rm -rf Payload
            ls -la "$IPA_PATH"
          else
            echo "App not found at $BUILT_APP"
            find "$HOME/Library/Developer/Xcode/DerivedData" -name "MusixiOS.app" -type d 2>/dev/null
          fi

      - name: Upload IPA to Releases
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: MusixiOS.ipa
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          body: 'MusixiOS iOS App - Release ${{ github.event.inputs.tag }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs
          retention-days: 7
